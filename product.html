<!DOCTYPE html>
<!--
  ============================================================
  KANAP — Page produit (product.html)
  Affichage dynamique d'un produit via l'API (id en URL)
  Accessibilité : RGAA 4.1
  Responsive : 320px et +
  SEO : titre dynamique, structure sémantique
  ============================================================
-->
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

  <!-- SEO — Titre mis à jour dynamiquement par product.js -->
  <title>Kanap — Détail produit</title>
  <meta name="description" content="Détail et personnalisation de votre canapé Kanap. Choisissez votre couleur et ajoutez au panier." />
  <meta name="robots" content="index, follow" />

  <meta name="theme-color" content="#1a6e7e" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Lien d'évitement — RGAA 12.7 -->
  <a class="skip-link" href="#main-content">Aller au contenu principal</a>

  <!-- Zone d'annonces pour lecteurs d'écran -->
  <div
    id="sr-announcer"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>

  <!-- ============================================================
       EN-TÊTE & NAVIGATION
  ============================================================ -->
  <header role="banner">
    <div class="header-inner">
      <a href="./index.html" class="logo-link" aria-label="Kanap — Retour à l'accueil">
        <span class="logo-text" aria-hidden="true">KANAP</span>
      </a>

      <nav aria-label="Navigation principale">
        <ul class="main-nav" role="list">
          <li>
            <a href="./index.html" class="nav-link">Accueil</a>
          </li>
          <li>
            <a href="./cart.html"
               class="cart-nav-link"
               id="cart-nav-link"
               aria-label="Panier — vide">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   aria-hidden="true" focusable="false">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
              </svg>
              Panier
              <span class="cart-count-badge"
                    id="cart-count-badge"
                    aria-label="articles dans le panier"
                    style="display:none;">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ============================================================
       CONTENU PRINCIPAL
  ============================================================ -->
  <main id="main-content" tabindex="-1">
    <div class="container">

      <!-- Fil d'Ariane — RGAA 12.6 : plan de navigation cohérent -->
      <nav aria-label="Fil d'Ariane" class="breadcrumb">
        <ol role="list">
          <li>
            <a href="./index.html">Accueil</a>
            <span class="breadcrumb-separator" aria-hidden="true">›</span>
          </li>
          <li>
            <a href="./index.html">Catalogue</a>
            <span class="breadcrumb-separator" aria-hidden="true">›</span>
          </li>
          <li aria-current="page" id="breadcrumb-product-name">
            Chargement…
          </li>
        </ol>
      </nav>

      <!-- Zone d'état (chargement/erreur) -->
      <div role="status"
           aria-live="polite"
           aria-atomic="true"
           id="product-status"
           class="sr-only">
        Chargement du produit en cours…
      </div>

      <!-- Layout du produit — rempli dynamiquement par product.js -->
      <div class="product-page" id="product-page" aria-busy="true">

        <!-- Image produit -->
        <div class="product-image-container" id="product-image-container">
          <!-- Image chargée par JS -->
        </div>

        <!-- Détails et formulaire -->
        <div class="product-details" id="product-details">

          <!-- Titre produit — h1 unique sur la page -->
          <h1 id="product-title" class="product-title">Chargement…</h1>

          <!-- Prix -->
          <p class="product-price" id="product-price" aria-label="Prix du produit"></p>

          <!-- Description -->
          <p class="product-description" id="product-description"></p>

          <!-- Formulaire de personnalisation et d'ajout au panier -->
          <form
            id="product-form"
            class="product-form"
            aria-label="Personnalisation et ajout au panier"
            novalidate
          >

            <!-- Sélection de la couleur -->
            <div class="form-group">
              <label for="product-colors">
                Couleur
                <span class="required-indicator" aria-hidden="true">*</span>
                <span class="sr-only">(champ obligatoire)</span>
              </label>
              <select
                id="product-colors"
                name="color"
                required
                aria-required="true"
                aria-describedby="color-error"
              >
                <option value="">-- Choisissez une couleur --</option>
                <!-- Options chargées dynamiquement par product.js -->
              </select>
              <!-- Message d'erreur — RGAA 11.11 -->
              <p class="error-message"
                 id="color-error"
                 role="alert"
                 aria-live="assertive"
                 hidden></p>
            </div>

            <!-- Sélection de la quantité -->
            <div class="form-group">
              <label for="product-quantity">
                Quantité
                <span class="required-indicator" aria-hidden="true">*</span>
                <span class="sr-only">(champ obligatoire, entre 1 et 100)</span>
              </label>
              <input
                type="number"
                id="product-quantity"
                name="quantity"
                min="1"
                max="100"
                value="1"
                required
                aria-required="true"
                aria-describedby="quantity-error quantity-hint"
              />
              <p id="quantity-hint" class="sr-only">
                Entrez un nombre entre 1 et 100.
              </p>
              <!-- Message d'erreur -->
              <p class="error-message"
                 id="quantity-error"
                 role="alert"
                 aria-live="assertive"
                 hidden></p>
            </div>

            <!-- Bouton ajout au panier -->
            <button
              type="submit"
              class="btn btn-secondary btn-full"
              id="btn-add-to-cart"
            >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   aria-hidden="true" focusable="false">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
              </svg>
              Ajouter au panier
            </button>

            <!-- Notification de succès (accessible) -->
            <div
              id="add-to-cart-success"
              class="alert alert-success"
              role="alert"
              aria-live="polite"
              hidden
            >
              <!-- Message injecté dynamiquement -->
            </div>

          </form>

        </div>
      </div>

    </div><!-- /.container -->
  </main>

  <!-- ============================================================
       PIED DE PAGE
  ============================================================ -->
  <footer role="contentinfo">
    <div class="footer-inner">
      <span class="footer-logo" aria-label="Kanap">KANAP</span>
      <nav aria-label="Liens du pied de page">
        <ul class="footer-links" role="list">
          <li><a href="#">Mentions légales</a></li>
          <li><a href="#">Conditions générales</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <p><small>© <span id="current-year"></span> Kanap. Tous droits réservés.</small></p>
    </div>
  </footer>

  <script src="./api.js"></script>
  <script src="./cart.js"></script>
  <script src="./validation.js"></script>
  <script src="./product.js"></script>

</body>
</html>
